<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Blocked - SafeSurf AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #08111f;
            --bg-mid: #10243a;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-line: rgba(255, 255, 255, 0.2);
            --text-main: #f7fbff;
            --text-muted: #a9b8c7;
            --accent-danger: #ff5c7a;
            --accent-brand: #69a7ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 24px;
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background:
                linear-gradient(145deg, rgba(105, 167, 255, 0.16), transparent 42%),
                radial-gradient(circle at 22% 14%, rgba(255, 92, 122, 0.24), transparent 34%),
                radial-gradient(circle at 82% 88%, rgba(36, 212, 154, 0.13), transparent 34%),
                linear-gradient(160deg, var(--bg-mid), var(--bg-deep) 72%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 7%;
            border-radius: 48px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.14), transparent 34%),
                linear-gradient(315deg, rgba(255, 92, 122, 0.14), transparent 42%);
            filter: blur(22px);
            opacity: 0.85;
        }

        .container {
            position: relative;
            width: min(100%, 580px);
            text-align: center;
            padding: 42px 38px 34px;
            border: 1px solid var(--glass-line);
            border-radius: 28px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08)),
                var(--glass);
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow:
                0 28px 70px rgba(2, 8, 23, 0.42),
                inset 0 1px 0 rgba(255, 255, 255, 0.36),
                inset 0 -20px 38px rgba(7, 18, 31, 0.22),
                0 0 44px rgba(255, 92, 122, 0.14);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--accent-danger);
            border: 1px solid rgba(255, 255, 255, 0.24);
            background:
                radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.12) 31%, transparent 58%),
                rgba(255, 255, 255, 0.08);
            box-shadow:
                inset 0 2px 5px rgba(255, 255, 255, 0.32),
                inset 0 -14px 24px rgba(2, 8, 23, 0.3),
                0 14px 32px rgba(2, 8, 23, 0.32),
                0 0 30px rgba(255, 92, 122, 0.2);
        }

        h1 {
            font-size: clamp(28px, 5vw, 38px);
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 0;
            line-height: 1.08;
        }

        p {
            max-width: 460px;
            margin: 0 auto 30px;
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.65;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 24px;
            border-radius: 999px;
            color: #06111f;
            font-weight: 700;
            text-decoration: none;
            background:
                linear-gradient(180deg, #ffffff, #dcecff);
            box-shadow:
                0 12px 28px rgba(2, 8, 23, 0.28),
                inset 0 1px 1px rgba(255, 255, 255, 0.95),
                inset 0 -3px 8px rgba(94, 127, 166, 0.26);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 18px 34px rgba(2, 8, 23, 0.32),
                0 0 24px rgba(105, 167, 255, 0.18),
                inset 0 1px 1px rgba(255, 255, 255, 0.95);
        }

        .branding {
            margin-top: 28px;
            font-size: 13px;
            color: rgba(224, 235, 246, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .branding svg {
            width: 16px;
            height: 16px;
            color: var(--accent-brand);
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 32px 22px 28px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <h1>Unsafe Website Blocked</h1>
        <p>SafeSurf AI has prevented access to this site because it may contain adult, explicit, or otherwise unsafe content.</p>
        <a href="javascript:window.history.back();" class="btn">Go Back Safely</a>
        <div class="branding">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            Protected by SafeSurf AI
        </div>
    </div>
</body>
</html>
